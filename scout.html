<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scout Dashboard | Force Per4mance</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firebasestorage.googleapis.com">
  <link rel="stylesheet" href="style.css?v=5" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <style>
    .scout-wrapper {
      padding: 120px 40px 60px;
      min-height: 100vh;
      background: var(--fp4-black);
    }

    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 32px;
      margin-top: 48px;
    }

    .player-card {
      padding: 0;
      overflow: hidden;
    }

    .player-photo {
      height: 380px;
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .player-photo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(7, 7, 9, 0.9), transparent 60%);
    }

    .player-info {
      padding: 24px;
      position: relative;
    }

    .player-name {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .player-meta {
      font-size: 0.8rem;
      color: var(--fp4-orange);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .player-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding-top: 16px;
    }

    .stat-box {
      font-size: 0.75rem;
      color: var(--fp4-muted);
    }

    .stat-box span {
      display: block;
      color: var(--fp4-white);
      font-weight: 600;
      font-size: 0.9rem;
      margin-top: 2px;
    }

    .filter-bar {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .search-input {
      flex: 1;
      min-width: 280px;
      background: var(--glass-bg);
      border: var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 12px 20px;
      color: var(--fp4-white);
    }
  </style>
</head>

<body>

  <!-- Global Navbar Container -->
  <div id="navbar-container"></div>

  <div class="scout-wrapper">
    <div class="container">
      <header class="section-header">
        <div class="label">Elite Talent Pipeline</div>
        <h1 class="headline">Scout Dashboard</h1>
        <p class="subhead">Browse approved players and prospects in the Force Per4mance ecosystem.</p>
      </header>

      <div class="filter-bar">
        <input type="text" id="playerSearch" class="search-input"
          placeholder="Search by name, position, or nationality..." />
        <select class="search-input" style="flex: 0 0 200px;">
          <option>All Positions</option>
          <option>Forwards</option>
          <option>Midfielders</option>
          <option>Defenders</option>
          <option>Goalkeepers</option>
        </select>
      </div>

      <div id="playerGrid" class="player-grid">
        <!-- Players loaded via JS -->
        <p style="text-align: center; grid-column: 1/-1; padding: 100px; color: var(--fp4-muted);">
          Loading talent pool...
        </p>
      </div>
    </div>
  </div>

  <!-- Global Footer Container -->
  <div id="footer-container"></div>

  <script src="main.js?v=5" defer></script>
  <script type="module">
    import { initGlobalUI } from './js/ui.js?v=5';
    import { monitorAuthState } from './js/auth.js';
    import { getApprovedPlayers } from './js/db.js';
    import { db } from './js/firebase-config.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    initGlobalUI();

    const playerGrid = document.getElementById('playerGrid');

    // Route Protection: Verified Scouts Only
    monitorAuthState(async (user) => {
      if (!user) {
        window.location.href = 'scout-portal.html';
        return;
      }

      // Check role
      const userDoc = await getDoc(doc(db, "users", user.uid));
      const userData = userDoc.data();

      if (!userData || userData.role !== 'scout') {
        alert("Access Denied: You must be registered as a Scout.");
        window.location.href = 'scout-portal.html';
        return;
      }

      // If verified check is needed:
      // if (!userData.verified) { ... show pending message ... }

      loadScoutView();
    });

    async function loadScoutView() {
      try {
        const approvedPlayers = await getApprovedPlayers();
        playerGrid.innerHTML = '';

        if (approvedPlayers.length === 0) {
          playerGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 60px;">No approved player profiles found.</p>';
          return;
        }

        approvedPlayers.forEach((p) => {
          const pCard = document.createElement('div');
          pCard.className = 'glass-card player-card';

          const photoUrl = p.photoURL || 'https://via.placeholder.com/400x500/111116/F5A623?text=FP4+TALENT';

          pCard.innerHTML = `
            <div class="player-photo" style="background-image: url('${photoUrl}')"></div>
            <div class="player-info">
              <div class="player-meta">${p.position || 'Prospect'} • ${p.nationality || 'Unspecified'}</div>
              <div class="player-name">${p.fullName || 'Talent'}</div>
              <p style="font-size:0.8rem; color:var(--fp4-muted); margin-bottom:12px;">${p.club || 'Force Per4mance Academy'}</p>
              
              <div class="player-stats" style="display:flex; flex-direction:column; gap:12px; margin-top:20px; border-top:1px solid rgba(255,255,255,0.06); padding-top:20px;">
                <div class="stat-item">
                  <div class="stat-header" style="display:flex; justify-content:space-between; margin-bottom:4px;"><span class="stat-name" style="font-size:0.75rem; color:var(--fp4-muted); text-transform:uppercase; letter-spacing:0.05em;">Strength</span><span class="stat-val" style="font-size:0.8rem; font-weight:700;">${p.stats?.strength || 75}</span></div>
                  <div class="stat-bar" style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden;"><div class="stat-fill" style="height:100%; background:linear-gradient(90deg, var(--fp4-orange), var(--fp4-amber)); width:${p.stats?.strength || 75}%;"></div></div>
                </div>
                <div class="stat-item">
                  <div class="stat-header" style="display:flex; justify-content:space-between; margin-bottom:4px;"><span class="stat-name" style="font-size:0.75rem; color:var(--fp4-muted); text-transform:uppercase; letter-spacing:0.05em;">Speed</span><span class="stat-val" style="font-size:0.8rem; font-weight:700;">${p.stats?.speed || 82}</span></div>
                  <div class="stat-bar" style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden;"><div class="stat-fill" style="height:100%; background:linear-gradient(90deg, var(--fp4-orange), var(--fp4-amber)); width:${p.stats?.speed || 82}%;"></div></div>
                </div>
                <div class="stat-item">
                  <div class="stat-header" style="display:flex; justify-content:space-between; margin-bottom:4px;"><span class="stat-name" style="font-size:0.75rem; color:var(--fp4-muted); text-transform:uppercase; letter-spacing:0.05em;">Technique</span><span class="stat-val" style="font-size:0.8rem; font-weight:700;">${p.stats?.technique || 78}</span></div>
                  <div class="stat-bar" style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden;"><div class="stat-fill" style="height:100%; background:linear-gradient(90deg, var(--fp4-orange), var(--fp4-amber)); width:${p.stats?.technique || 78}%;"></div></div>
                </div>
                <div class="stat-item">
                  <div class="stat-header" style="display:flex; justify-content:space-between; margin-bottom:4px;"><span class="stat-name" style="font-size:0.75rem; color:var(--fp4-muted); text-transform:uppercase; letter-spacing:0.05em;">Tactics</span><span class="stat-val" style="font-size:0.8rem; font-weight:700;">${p.stats?.tactical || 70}</span></div>
                  <div class="stat-bar" style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden;"><div class="stat-fill" style="height:100%; background:linear-gradient(90deg, var(--fp4-orange), var(--fp4-amber)); width:${p.stats?.tactical || 70}%;"></div></div>
                </div>
              </div>
              
              <button class="btn btn-primary" onclick="window.location.href='player-profile.html?id=${p.id}'" style="width:100%; margin-top:20px; padding:12px; font-size:0.8rem;">View Full Bio</button>
            </div>
          `;
          playerGrid.appendChild(pCard);
        });
      } catch (e) {
        console.error("Error loading scout view:", e);
        playerGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 60px; color: #ff6666;">Error loading players. Check console.</p>';
      }
    }
  </script>
</body>

</html>
