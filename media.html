<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media & Highlights | Force Per4mance</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <style>
        .media-wrapper {
            padding: 140px 0 100px;
            background: var(--fp4-black);
            min-height: 100vh;
        }

        /* Cinema Hero */
        .featured-video-wrapper {
            margin-bottom: 80px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
        }

        .video-embed {
            position: relative;
            padding-bottom: 56.25%;
            /* 16:9 */
            height: 0;
            overflow: hidden;
        }

        .video-embed iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-info {
            padding: 40px;
        }

        .video-info .published-date {
            color: var(--fp4-muted);
            font-size: 0.9rem;
            margin-top: 10px;
        }

        /* Grid Styling */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .video-card {
            border: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        .video-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: var(--fp4-orange);
        }

        .video-thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .video-card:hover .play-overlay {
            opacity: 1;
        }

        .video-content {
            padding: 20px;
            flex-grow: 1;
        }

        .video-title {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 8px;
            display: -webkit-box;
            line-clamp: 2;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-meta {
            font-size: 0.8rem;
            color: var(--fp4-muted);
        }

        .section-header .headline span {
            color: var(--fp4-orange);
        }
    </style>
</head>

<body>

    <div id="navbar-container"></div>

    <div class="media-wrapper">
        <div class="container">
            <!-- Header -->
            <header class="section-header" style="text-align: center; margin-bottom: 60px;">
                <div class="label">Force Per4mance TV</div>
                <h1 class="headline">Talent in <span>Motion</span></h1>
                <p class="subhead">Experience the intensity of our training programs and elite matches.</p>
            </header>

            <!-- Featured Video Section -->
            <div id="featuredVideo">
                <div style="padding: 100px; text-align: center; color: var(--fp4-muted);">
                    Initializing Digital Cinema...
                </div>
            </div>

            <!-- More Highlights Section -->
            <header class="section-header" style="margin-top: 100px;">
                <h2 class="headline" style="font-size: 2.2rem;">Recent <span>Uploads</span></h2>
            </header>

            <div id="videoGrid" class="video-grid">
                <!-- Videos loaded via JS -->
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="main.js"></script>
    <script type="module">
        import { initGlobalUI } from './js/ui.js';
        import { fetchYouTubeVideos, renderVideos } from './js/media.js';

        // Load Global UI (Navbar/Footer)
        initGlobalUI();

        // Load Content
        async function loadMedia() {
            const videos = await fetchYouTubeVideos();
            renderVideos(videos, 'featuredVideo', 'videoGrid');
        }

        loadMedia();
    </script>
</body>

</html>
