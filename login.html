<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Force Per4mance</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firebasestorage.googleapis.com">
  <link rel="stylesheet" href="style.css?v=5" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top right, rgba(245, 166, 35, 0.08), transparent 40%),
        radial-gradient(circle at bottom left, rgba(245, 166, 35, 0.05), transparent 40%),
        var(--fp4-black);
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 440px;
      padding: 48px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header img {
      width: 64px;
      margin: 0 auto 16px;
      filter: drop-shadow(0 0 12px rgba(245, 166, 35, 0.3));
    }

    .login-header h2 {
      font-size: 2rem;
      font-weight: 800;
    }

    .login-error {
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid rgba(255, 68, 68, 0.2);
      color: #ff6666;
      padding: 12px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      margin-bottom: 24px;
      display: none;
      text-align: center;
    }

    /* Password Eyelid Tool */
    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-wrapper input {
      width: 100%;
      padding-right: 48px !important;
      /* Force override for padding */
    }

    .password-toggle {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: var(--fp4-muted);
      cursor: pointer;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, transform 0.2s;
      z-index: 10;
    }

    .password-toggle:hover {
      color: var(--fp4-orange);
      transform: translateY(-50%) scale(1.1);
    }

    .eye-icon {
      width: 20px;
      height: 20px;
    }
  </style>
</head>

<body>

  <div id="navbar-container"></div>

  <div class="login-container">
    <div class="glass-card login-card reveal visible">
      <div class="login-header">
        <img src="assets/logo.png" alt="FP4 Logo" />
        <h2 class="headline">Welcome Back</h2>
        <p class="overline" style="margin-top:8px;">Force Per4mance Portal</p>
      </div>

      <div class="login-error" id="loginError">Invalid email or password. Please try again.</div>

      <form id="loginForm">
        <div class="form-group" style="margin-bottom: 20px;">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="coach@forceper4mance.com" required />
        </div>
        <div class="form-group" style="margin-bottom: 32px;">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••" required />
            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
              <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" id="eyeIcon">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;" id="submitBtn">
          Sign In
        </button>
      </form>

      <div style="margin-top: 24px; text-align: center;">
        <p style="font-size: 0.85rem; color: var(--fp4-muted);">
          <span id="toggleText">Don't have an account?</span>
          <a href="#" id="toggleSignup" style="color: var(--fp4-orange); font-weight: 600;">Sign Up</a>
        </p>
      </div>

      <div style="margin-top: 32px; text-align: center;">
        <a href="index.html" class="mega-footer-link" style="justify-content: center;">
          <span>←</span> Back to Homepage
        </a>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="main.js?v=5" defer></script>
  <script type="module">
    import { initGlobalUI } from './js/ui.js?v=5';
    import { loginUser } from './js/auth.js';
    import { auth } from './js/firebase-config.js';
    import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    initGlobalUI();

    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const submitBtn = document.getElementById('submitBtn');
    const toggleSignup = document.getElementById('toggleSignup');
    const toggleText = document.getElementById('toggleText');
    const headline = document.querySelector('.headline');

    let isSignup = false;

    toggleSignup.addEventListener('click', (e) => {
      e.preventDefault();
      isSignup = !isSignup;
      headline.textContent = isSignup ? 'Create Account' : 'Welcome Back';
      submitBtn.textContent = isSignup ? 'Sign Up' : 'Sign In';
      toggleText.textContent = isSignup ? 'Already have an account?' : "Don't have an account?";
      toggleSignup.textContent = isSignup ? 'Sign In' : 'Sign Up';
    });

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.style.display = 'none';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        let user;
        if (isSignup) {
          const userCredential = await createUserWithEmailAndPassword(auth, email, password);
          user = userCredential.user;
        } else {
          const result = await loginUser(email, password);
          user = result.user;
          if (!user) throw new Error(result.error || 'Login failed');
        }

        if (user) {
          // Admin list
          const adminEmails = ['slowmotion767@gmail.com', 'admin@forceper4mance.com', 'coach@forceper4mance.com'];
          const isAdmin = adminEmails.includes(email.toLowerCase()) || email.includes('admin') || email.includes('coach');

          if (isAdmin) {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'profile.html';
          }
        }
      } catch (error) {
        loginError.textContent = error.message;
        loginError.style.display = 'block';
      }
    });

    // Password Visibility Toggle
    const passwordInput = document.getElementById('password');
    const passwordToggle = document.getElementById('passwordToggle');
    const eyeIcon = document.getElementById('eyeIcon');

    passwordToggle.addEventListener('click', () => {
      const isPassword = passwordInput.getAttribute('type') === 'password';
      passwordInput.setAttribute('type', isPassword ? 'text' : 'password');

      // Change icon based on state
      if (isPassword) {
        eyeIcon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        `;
      } else {
        eyeIcon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        `;
      }
    });
  </script>

</body>

</html>
